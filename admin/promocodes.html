<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#151b28" />
    <title>Сертификаты — AURUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        html { overflow-x: hidden; max-width: 100%; color-scheme: dark; }
        .admin-app-scope { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .aurum-premium-shell {
            background:
                radial-gradient(ellipse 110% 78% at 50% -10%, rgba(110, 175, 235, 0.14), transparent 56%),
                linear-gradient(168deg, #181f2e 0%, #151b28 40%, #161d2a 100%);
            background-attachment: fixed;
        }
        .admin-glass-card {
            background: linear-gradient(152deg, rgba(238, 242, 252, 0.1) 0%, rgba(238, 242, 252, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.11);
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(14px);
        }
        .admin-panel {
            background: linear-gradient(152deg, rgba(238, 242, 252, 0.075) 0%, rgba(238, 242, 252, 0.038) 100%);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .admin-app-scope input, .admin-app-scope select { background: rgba(14, 20, 32, 0.62) !important; border: 1px solid rgba(142, 200, 255, 0.22) !important; color: #f2ebe1 !important; }
        .admin-btn-ice {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem;
            color: #f2ebe1;
            background: linear-gradient(180deg, rgba(110, 176, 240, 0.24) 0%, rgba(255, 255, 255, 0.06) 100%);
            border: 1px solid rgba(142, 200, 255, 0.38);
        }
        .admin-btn-danger {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem;
            color: #fce8e8;
            background: linear-gradient(180deg, rgba(200, 72, 82, 0.45) 0%, rgba(130, 36, 48, 0.55) 100%);
            border: 1px solid rgba(255, 190, 190, 0.28);
        }
        .admin-btn-muted {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem;
            color: #8ec8ff;
            background: rgba(14, 20, 32, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .admin-back-fab {
            display: flex; width: 2.5rem; height: 2.5rem; align-items: center; justify-content: center;
            border-radius: 9999px;
            background: linear-gradient(145deg, #6eb0f0 0%, #3b82c4 100%);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #f2ebe1;
        }
        .from-amber-600.to-yellow-600 {
            background-image: linear-gradient(to right, #3d7eb8, #6eb0f0, #c8b8a8) !important;
            color: #080c14 !important;
        }
    </style>
</head>
<body class="aurum-premium-shell admin-app-scope min-h-screen text-[#f2ebe1] pb-[env(safe-area-inset-bottom)]">
<div id="admin-login" class="min-h-screen flex items-center justify-center p-4">
  <div class="admin-glass-card max-w-md w-full mx-auto p-8 rounded-xl">
    <h1 class="text-2xl font-bold text-center mb-6">Панель управления</h1>
    <div id="login-err" class="hidden bg-red-500/15 border border-red-400/40 rounded-xl p-3 mb-4 text-red-300 text-sm"></div>
    <form id="admin-login-form" class="space-y-4">
      <div>
        <label class="block text-sm mb-2">Пароль</label>
        <input type="password" id="admin-pw" required class="w-full p-3 rounded-xl" autofocus>
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-yellow-600 py-3 rounded-xl font-bold">Войти</button>
    </form>
    <p class="text-center mt-6"><a href="#" class="hidden admin-fallback-shop admin-back-fab mx-auto w-auto px-4 py-2 rounded-full text-sm no-underline">← В магазин</a></p>
  </div>
</div>
<div id="admin-app" class="hidden">
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <a href="#" class="admin-fallback-shop admin-back-fab hidden fixed left-3 top-14 z-[60]" title="В магазин"><i class="fas fa-arrow-left"></i></a>
        <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center sm:pl-12">
            <div>
                <h1 class="text-2xl font-bold mb-1"><i class="fas fa-ticket-alt mr-2 text-[#8ec8ff]"></i>Сертификаты</h1>
                <p class="text-sm text-[#b8c4d4]">Коды сертификатов и скидка % (активация в мини-приложении)</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <a href="products.html" class="admin-btn-ice"><i class="fas fa-box"></i>Товары</a>
                <a href="orders.html" class="admin-btn-ice"><i class="fas fa-shopping-cart"></i>Заказы</a>
                <a href="reviews.html" class="admin-btn-ice"><i class="fas fa-star"></i>Отзывы</a>
                <button type="button" id="admin-logout" class="admin-btn-danger"><i class="fas fa-sign-out-alt"></i>Выход</button>
            </div>
        </div>

        <div class="admin-panel rounded-xl p-4 mb-6">
            <h2 class="text-lg font-semibold text-[#8ec8ff] mb-3">Новый сертификат</h2>
            <form id="promo-create-form" class="flex flex-col sm:flex-row flex-wrap gap-3 items-stretch sm:items-end">
                <div class="flex-1 min-w-[8rem]">
                    <label class="block text-xs mb-1">Код</label>
                    <input type="text" id="promo-new-code" class="w-full p-2.5 rounded-xl uppercase" maxlength="64" autocomplete="off" placeholder="Например SUMMER10">
                </div>
                <div class="w-full sm:w-28">
                    <label class="block text-xs mb-1">Скидка % <span id="promo-cap-hint" class="text-[#8b97ab] font-normal"></span></label>
                    <input type="number" id="promo-new-pct" class="w-full p-2.5 rounded-xl" min="0.01" max="50" step="0.01" value="5">
                </div>
                <div id="promo-creator-wrap" class="hidden w-full sm:w-44">
                    <label class="block text-xs mb-1">Ваш Telegram ID</label>
                    <input type="text" id="promo-creator-tg" class="w-full p-2.5 rounded-xl" inputmode="numeric" placeholder="для менеджера" autocomplete="off">
                </div>
                <div class="flex items-center gap-2 pb-2">
                    <input type="checkbox" id="promo-new-active" checked class="w-4 h-4 rounded">
                    <label for="promo-new-active" class="text-sm">Активен</label>
                </div>
                <button type="submit" class="admin-btn-ice"><i class="fas fa-plus"></i>Создать</button>
            </form>
            <p id="promo-manager-note" class="hidden text-xs text-[#8b97ab] mt-2">Менеджер: скидка не выше 15%, свой сертификат нельзя применить к себе. Telegram ID подставляется из мини-приложения, если открыли страницу из Telegram.</p>
        </div>

        <div class="admin-panel rounded-xl p-4 mb-4 flex flex-wrap gap-3 items-center">
            <button type="button" id="promo-refresh" class="admin-btn-muted"><i class="fas fa-sync-alt"></i>Обновить</button>
        </div>
        <div id="promo-list" class="space-y-3"></div>
    </div>
</div>
<script>
(function () {
    const API_BASE_URL = (() => {
        const explicit = (window.API_URL || localStorage.getItem('API_URL') || '').trim();
        if (explicit) return explicit.replace(/\/+$/, '');
        const { origin, hostname, port, pathname, protocol } = window.location;
        if (protocol === 'file:') return 'http://127.0.0.1:8000/api';
        if ((hostname === 'localhost' || hostname === '127.0.0.1') && port !== '8000' && port !== '8001' && pathname.includes('/pc_salon/'))
            return 'http://127.0.0.1:8000/api';
        return `${origin.replace(/\/$/, '')}/api`;
    })();
    const ADMIN_TOKEN_KEY = 'aurum_admin_token';
    function adminAuthHeaders() {
        const t = sessionStorage.getItem(ADMIN_TOKEN_KEY);
        return t ? { Authorization: 'Bearer ' + t } : {};
    }
    function mergeH(a, b) { return Object.assign({}, a || {}, b || {}); }
    async function adminFetch(url, init) {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 120000);
        try {
            return await fetch(url, Object.assign({}, init || {}, { signal: ctrl.signal }));
        } finally {
            clearTimeout(tid);
        }
    }
    function esc(s) {
        return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function aurumSetupBack() {
        document.querySelectorAll('.admin-fallback-shop').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                const p = window.location.pathname || '/';
                const i = p.indexOf('/admin/');
                const prefix = i > 0 ? p.slice(0, i + 1) : '/';
                window.location.href = window.location.origin + prefix.replace(/\/?$/, '/');
            });
        });
        const tg = window.Telegram && window.Telegram.WebApp;
        if (!tg || !tg.BackButton) {
            document.querySelectorAll('.admin-fallback-shop').forEach(el => el.classList.remove('hidden'));
            return;
        }
        try { tg.ready(); tg.expand(); } catch (e) {}
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            const p = window.location.pathname || '/';
            const idx = p.indexOf('/admin/');
            window.location.href = idx !== -1 ? window.location.origin + (idx === 0 ? '/' : p.slice(0, idx + 1)) : '/';
        });
    }
    async function adminSessionOk() {
        const t = sessionStorage.getItem(ADMIN_TOKEN_KEY);
        if (!t) return false;
        try {
            const r = await adminFetch(`${API_BASE_URL}/admin/session`, { headers: adminAuthHeaders() });
            return r.ok;
        } catch (e) { return false; }
    }
    let allPromos = [];
    let adminPromoRole = 'manager';
    const PROMO_CAP = { super: 50, manager: 15 };
    function promoPercentCap() {
        return adminPromoRole === 'super' ? PROMO_CAP.super : PROMO_CAP.manager;
    }
    async function loadAdminPromoRole() {
        try {
            const r = await adminFetch(`${API_BASE_URL}/admin/session`, { headers: adminAuthHeaders() });
            const d = await r.json().catch(() => ({}));
            if (r.ok && d.role) adminPromoRole = d.role;
        } catch (e) {}
        applyPromoRoleUi();
    }
    function applyPromoRoleUi() {
        const cap = promoPercentCap();
        const pctEl = document.getElementById('promo-new-pct');
        if (pctEl) {
            pctEl.max = String(cap);
            if (parseFloat(pctEl.value) > cap) pctEl.value = String(cap);
        }
        const hint = document.getElementById('promo-cap-hint');
        if (hint) hint.textContent = adminPromoRole === 'super' ? '(макс. 50%)' : '(макс. 15%)';
        const wrap = document.getElementById('promo-creator-wrap');
        const note = document.getElementById('promo-manager-note');
        if (wrap) wrap.classList.toggle('hidden', adminPromoRole !== 'manager');
        if (note) note.classList.toggle('hidden', adminPromoRole !== 'manager');
        try {
            const u = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
            const cr = document.getElementById('promo-creator-tg');
            if (cr && u && u.id && !cr.value.trim()) cr.value = String(u.id);
        } catch (e) {}
    }
    function renderList() {
        const box = document.getElementById('promo-list');
        if (!allPromos.length) {
            box.innerHTML = '<p class="text-[#b8c4d4] text-center py-8">Нет сертификатов (примените миграцию БД и перезапустите API)</p>';
            return;
        }
        box.innerHTML = allPromos.map(p => {
            const active = !!p.is_active;
            return `<div class="admin-panel rounded-xl p-4" data-id="${p.id}">
                <div class="flex flex-col sm:flex-row gap-3 sm:items-end sm:justify-between">
                    <div class="min-w-0 flex-1">
                        <div class="font-mono text-amber-200 font-bold text-lg">${esc(p.code)}</div>
                        <div class="text-xs text-[#8b97ab] mt-1">id ${p.id} · обновл. ${esc(p.updated_at || '')}${p.creator_telegram_id != null ? ` · создатель TG ${esc(p.creator_telegram_id)}` : ''}</div>
                        ${p.note ? `<div class="text-xs text-[#b8c4d4] mt-1">${esc(p.note)}</div>` : ''}
                    </div>
                    <div class="flex flex-wrap gap-2 items-center">
                        <label class="text-xs text-[#8ec8ff]">%</label>
                        <input type="number" class="promo-pct w-24 p-2 rounded-xl text-sm" min="0.01" max="${promoPercentCap()}" step="0.01" value="${esc(p.discount_percent)}" data-id="${p.id}">
                        <label class="flex items-center gap-1 text-sm cursor-pointer">
                            <input type="checkbox" class="promo-active w-4 h-4" data-id="${p.id}" ${active ? 'checked' : ''}> Активен
                        </label>
                        <button type="button" class="promo-save admin-btn-ice text-sm" data-id="${p.id}"><i class="fas fa-save"></i>Сохранить</button>
                        <button type="button" class="promo-del admin-btn-danger text-sm" data-id="${p.id}"><i class="fas fa-trash-alt"></i>Удалить</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        box.querySelectorAll('.promo-save').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = parseInt(btn.getAttribute('data-id'), 10);
                const row = box.querySelector(`.admin-panel[data-id="${id}"]`);
                const pctEl = row && row.querySelector('.promo-pct');
                const actEl = row && row.querySelector('.promo-active');
                const pct = parseFloat(pctEl && pctEl.value);
                const cap = promoPercentCap();
                if (!Number.isFinite(pct) || pct <= 0 || pct > cap + 1e-9) {
                    alert('Укажите процент от 0.01 до ' + cap + ' для вашей роли');
                    return;
                }
                btn.disabled = true;
                try {
                    const r = await adminFetch(`${API_BASE_URL}/admin/promo-codes/${id}`, {
                        method: 'PATCH',
                        headers: mergeH({ 'Content-Type': 'application/json' }, adminAuthHeaders()),
                        body: JSON.stringify({
                            discount_percent: pct,
                            is_active: !!(actEl && actEl.checked)
                        })
                    });
                    const d = await r.json().catch(() => ({}));
                    if (!r.ok) throw new Error(d.error || 'Ошибка');
                    await loadPromos();
                } catch (e) {
                    alert(e.message || 'Не удалось сохранить');
                } finally {
                    btn.disabled = false;
                }
            });
        });
        box.querySelectorAll('.promo-del').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = parseInt(btn.getAttribute('data-id'), 10);
                const row = box.querySelector(`.admin-panel[data-id="${id}"]`);
                const codeEl = row && row.querySelector('.font-mono');
                const codeHint = codeEl ? codeEl.textContent.trim() : '';
                if (!confirm(codeHint ? `Удалить сертификат «${codeHint}»?` : 'Удалить этот сертификат?')) return;
                btn.disabled = true;
                try {
                    const r = await adminFetch(`${API_BASE_URL}/admin/promo-codes/${id}`, {
                        method: 'DELETE',
                        headers: adminAuthHeaders()
                    });
                    const d = await r.json().catch(() => ({}));
                    if (!r.ok) throw new Error(d.error || 'Ошибка');
                    await loadPromos();
                } catch (e) {
                    alert(e.message || 'Не удалось удалить');
                } finally {
                    btn.disabled = false;
                }
            });
        });
    }
    async function loadPromos() {
        const box = document.getElementById('promo-list');
        box.innerHTML = '<p class="text-[#b8c4d4] text-center py-6">Загрузка…</p>';
        try {
            const r = await adminFetch(`${API_BASE_URL}/admin/promo-codes`, { headers: adminAuthHeaders() });
            const d = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(d.error || 'HTTP ' + r.status);
            allPromos = d.promo_codes || d.data || [];
            renderList();
        } catch (e) {
            box.innerHTML = `<p class="text-red-300 text-center py-6">${esc(e.message)}</p>`;
        }
    }
    document.addEventListener('DOMContentLoaded', () => {
        aurumSetupBack();
        const loginEl = document.getElementById('admin-login');
        const appEl = document.getElementById('admin-app');
        (async () => {
            if (await adminSessionOk()) {
                loginEl.classList.add('hidden');
                appEl.classList.remove('hidden');
                await loadAdminPromoRole();
                await loadPromos();
            }
        })();
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('login-err');
            err.classList.add('hidden');
            const pw = document.getElementById('admin-pw').value;
            try {
                const r = await adminFetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                const data = await r.json().catch(() => ({}));
                if (r.ok && data.success && data.token) {
                    sessionStorage.setItem(ADMIN_TOKEN_KEY, data.token);
                    location.reload();
                } else {
                    err.textContent = data.error || 'Неверный пароль';
                    err.classList.remove('hidden');
                }
            } catch (ex) {
                err.textContent = 'Сеть: ' + (ex.message || '');
                err.classList.remove('hidden');
            }
        });
        document.getElementById('admin-logout')?.addEventListener('click', () => {
            sessionStorage.removeItem(ADMIN_TOKEN_KEY);
            location.reload();
        });
        document.getElementById('promo-refresh')?.addEventListener('click', () => loadPromos());
        document.getElementById('promo-create-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('promo-new-code').value.trim();
            const pct = parseFloat(document.getElementById('promo-new-pct').value);
            const is_active = document.getElementById('promo-new-active').checked;
            const cap = promoPercentCap();
            if (!code) { alert('Введите код'); return; }
            if (!Number.isFinite(pct) || pct <= 0 || pct > cap + 1e-9) { alert('Процент от 0.01 до ' + cap + ' для вашей роли'); return; }
            const payload = { code: code.toUpperCase(), discount_percent: pct, is_active };
            if (adminPromoRole === 'manager') {
                const ct = parseInt(String(document.getElementById('promo-creator-tg') && document.getElementById('promo-creator-tg').value || '').trim(), 10);
                if (!Number.isFinite(ct)) { alert('Укажите ваш Telegram ID (нужен для защиты от самоприменения сертификата)'); return; }
                payload.creator_telegram_id = ct;
            }
            try {
                const r = await adminFetch(`${API_BASE_URL}/admin/promo-codes`, {
                    method: 'POST',
                    headers: mergeH({ 'Content-Type': 'application/json' }, adminAuthHeaders()),
                    body: JSON.stringify(payload)
                });
                const d = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(d.error || 'Ошибка');
                document.getElementById('promo-new-code').value = '';
                await loadPromos();
            } catch (err) {
                alert(err.message || 'Не удалось создать');
            }
        });
    });
})();
</script>
</body>
</html>
